<!DOCTYPE html>
<html>
<head>
    <title>Agent Authorization Service</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; }
        .status { font-size: 18px; color: #666; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .target-url { font-weight: bold; color: #0078d4; word-break: break-all; }
        .error { color: #d93025; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="spinner" class="spinner"></div>
        <h1 id="title">Verifying Request...</h1>
        <p class="status" id="status-text">Checking authorization logic for <br><span class="target-url" id="target">...</span></p>
        <p>Please open the <b>Agent Authorization PEP</b> extension to review this request.</p>
        <p class="error" id="error-msg"></p>
    </div>
    <script src="block.js"></script>
</body>
</html>
