<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Policy...</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .shield {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00d4ff;
        }
        .url {
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 20px 0;
            word-break: break-all;
            max-width: 500px;
        }
        .status {
            font-size: 16px;
            color: #aaa;
            margin-top: 10px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
        }
        .result.permit {
            background: rgba(40, 167, 69, 0.2);
            border: 2px solid #28a745;
        }
        .result.block {
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid #dc3545;
        }
        .result.consent {
            background: rgba(255, 193, 7, 0.2);
            border: 2px solid #ffc107;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-allow { background: #28a745; color: white; }
        .btn-deny { background: #dc3545; color: white; }
        .btn-back { background: #6c757d; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">🛡️</div>
        <h1>Checking Security Policy</h1>
        <div class="url" id="targetUrl">Loading...</div>
        <div class="spinner" id="spinner"></div>
        <div class="status" id="status">Verifying with Policy Engine...</div>
        
        <div class="result" id="result">
            <p id="resultMessage"></p>
            <div id="buttons" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script src="checking.js"></script>
</body>
</html>
